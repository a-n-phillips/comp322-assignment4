<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMP 322 - Assignment 4</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 30px;
      background-color: #f5f5f5;
    }

    .form-wrapper {
      background: white;
      border: 1px solid #ccc;
      padding: 30px 40px;
      width: 600px;
    }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .form-row label {
      width: 160px;
      text-align: right;
      margin-right: 10px;
      font-size: 14px;
    }

    .form-row input[type="text"],
    .form-row input[type="password"],
    .form-row select {
      width: 160px;
      padding: 3px 5px;
      font-size: 14px;
      border: 1px solid #999;
    }

    .form-row .radio-group,
    .form-row .checkbox-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 14px;
    }

    .music-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .music-row label.music-label {
      width: 160px;
      text-align: right;
      margin-right: 10px;
      font-size: 14px;
      padding-top: 2px;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-row button {
      padding: 4px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    #error-section {
      margin-top: 16px;
      font-size: 14px;
      line-height: 2;
    }

    #error-section p {
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <div class="form-wrapper">

    <div class="form-row">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username">
    </div>

    <div class="form-row">
      <label for="email">Email:</label>
      <input type="text" id="email" name="email">
    </div>

    <div class="form-row">
      <label for="phone">Phone number:</label>
      <input type="text" id="phone" name="phone">
    </div>

    <div class="form-row">
      <label for="password">Enter Password:</label>
      <input type="password" id="password" name="password">
    </div>

    <div class="form-row">
      <label for="confirm-password">Confirm Password:</label>
      <input type="password" id="confirm-password" name="confirm-password">
    </div>

    <div class="form-row">
      <label>Gender:</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="female"> Female</label>
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="other"> Other</label>
      </div>
    </div>

    <div class="form-row">
      <label for="age-group">Age Group:</label>
      <select id="age-group" name="age-group">
        <option value=""></option>
        <option value="under21">&lt; 21 years old</option>
        <option value="21-25">21 - 25 years old</option>
        <option value="26-35">26 - 35 years old</option>
        <option value="36-50">36 - 50 years old</option>
        <option value="over50">&gt; 50 years old</option>
      </select>
    </div>

    <div class="music-row">
      <label class="music-label">Favorite Music Genre:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="genre" value="Pop"> Pop</label>
        <label><input type="checkbox" name="genre" value="Hiphop"> Hiphop</label>
        <label><input type="checkbox" name="genre" value="Jazz"> Jazz</label>
        <label><input type="checkbox" name="genre" value="Rock"> Rock</label>
        <label><input type="checkbox" name="genre" value="Classical Music"> Classical Music</label>
        <label><input type="checkbox" name="genre" value="Country"> Country</label>
      </div>
    </div>

    <div class="btn-row">
      <button type="button" id="submit-btn">submit</button>
      <button type="reset" id="clear-btn">clear</button>
    </div>

    <div id="error-section"></div>

  </div>

  <script src="validation.js"></script>
</body>
</html>
